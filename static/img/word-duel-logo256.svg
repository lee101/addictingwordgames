<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="30" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="40" cy="40" r="60" fill="rgba(231,76,60,0.1)"/>
  <circle cx="216" cy="216" r="60" fill="rgba(52,152,219,0.1)"/>

  <!-- VS divider -->
  <line x1="128" y1="80" x2="128" y2="176" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Player 1 sword (left) -->
  <g transform="translate(55, 128) rotate(-30)">
    <!-- Blade -->
    <rect x="-8" y="-70" width="16" height="80" rx="3" fill="url(#redGrad)"/>
    <!-- Guard -->
    <rect x="-20" y="8" width="40" height="8" rx="2" fill="#f39c12"/>
    <!-- Handle -->
    <rect x="-6" y="16" width="12" height="30" rx="2" fill="#8b4513"/>
    <!-- Pommel -->
    <circle cx="0" cy="50" r="8" fill="#f39c12"/>
  </g>

  <!-- Player 2 sword (right) -->
  <g transform="translate(201, 128) rotate(30)">
    <!-- Blade -->
    <rect x="-8" y="-70" width="16" height="80" rx="3" fill="url(#blueGrad)"/>
    <!-- Guard -->
    <rect x="-20" y="8" width="40" height="8" rx="2" fill="#f39c12"/>
    <!-- Handle -->
    <rect x="-6" y="16" width="12" height="30" rx="2" fill="#8b4513"/>
    <!-- Pommel -->
    <circle cx="0" cy="50" r="8" fill="#f39c12"/>
  </g>

  <!-- Clash effect in center -->
  <g transform="translate(128, 90)">
    <polygon points="0,-15 5,-5 15,-8 8,0 15,8 5,5 0,15 -5,5 -15,8 -8,0 -15,-8 -5,-5" fill="#f39c12"/>
  </g>

  <!-- Letter tiles at bottom -->
  <g transform="translate(128, 200)">
    <!-- W -->
    <rect x="-60" y="-20" width="35" height="40" rx="5" fill="url(#purpleGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="-42" y="10" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">W</text>

    <!-- D -->
    <rect x="-18" y="-20" width="35" height="40" rx="5" fill="url(#purpleGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">D</text>

    <!-- ? -->
    <rect x="25" y="-20" width="35" height="40" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="42" y="10" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="rgba(255,255,255,0.5)" text-anchor="middle">?</text>
  </g>

  <!-- Title "DUEL" at top -->
  <text x="128" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">DUEL</text>
</svg>
