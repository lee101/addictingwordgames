<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="20" fill="url(#bgGrad)"/>

  <!-- Magnifying glass -->
  <circle cx="110" cy="100" r="45" fill="none" stroke="#f39c12" stroke-width="8"/>
  <line x1="145" y1="135" x2="185" y2="175" stroke="#f39c12" stroke-width="10" stroke-linecap="round"/>

  <!-- Question mark in magnifying glass -->
  <text x="110" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="url(#textGrad)">?</text>

  <!-- Text: WORD -->
  <text x="128" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">WORD</text>

  <!-- Text: DETECTIVE -->
  <text x="128" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#f39c12">DETECTIVE</text>
</svg>
