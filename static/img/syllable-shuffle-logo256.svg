<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)"/>

  <!-- Decorative ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>

  <!-- Syllable tiles -->
  <!-- First tile: "SYL" -->
  <g filter="url(#shadow)">
    <rect x="30" y="75" width="60" height="40" rx="8" fill="url(#tileGrad1)"/>
    <text x="60" y="102" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SYL</text>
  </g>

  <!-- Second tile: "LA" -->
  <g filter="url(#shadow)">
    <rect x="100" y="75" width="55" height="40" rx="8" fill="url(#tileGrad2)"/>
    <text x="127.5" y="102" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">LA</text>
  </g>

  <!-- Third tile: "BLE" -->
  <g filter="url(#shadow)">
    <rect x="165" y="75" width="60" height="40" rx="8" fill="url(#tileGrad3)"/>
    <text x="195" y="102" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">BLE</text>
  </g>

  <!-- Arrow indicating shuffle -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Curved shuffle arrow 1 -->
    <path d="M75 130 Q128 155 180 130" opacity="0.7"/>
    <path d="M172 125 L180 130 L175 138" opacity="0.7"/>

    <!-- Curved shuffle arrow 2 -->
    <path d="M180 145 Q128 170 75 145" opacity="0.7"/>
    <path d="M83 150 L75 145 L80 137" opacity="0.7"/>
  </g>

  <!-- Title text -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SHUFFLE</text>

  <!-- Small decorative dots -->
  <circle cx="50" cy="180" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="206" cy="180" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="128" cy="220" r="3" fill="rgba(255,255,255,0.4)"/>
</svg>
