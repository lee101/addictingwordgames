<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="speakerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="30" fill="url(#bgGrad)"/>

  <!-- Sound waves -->
  <g stroke="#00ff88" stroke-width="4" fill="none" opacity="0.7">
    <path d="M 155 90 Q 175 128 155 166" stroke-linecap="round"/>
    <path d="M 175 75 Q 205 128 175 181" stroke-linecap="round"/>
    <path d="M 195 60 Q 235 128 195 196" stroke-linecap="round"/>
  </g>

  <!-- Speaker icon -->
  <g fill="url(#speakerGrad)">
    <rect x="55" y="100" width="35" height="56" rx="5"/>
    <polygon points="90,100 130,70 130,186 90,156"/>
  </g>

  <!-- Keyboard representation at bottom -->
  <g fill="rgba(255,255,255,0.15)">
    <rect x="30" y="205" width="30" height="25" rx="4"/>
    <rect x="65" y="205" width="30" height="25" rx="4"/>
    <rect x="100" y="205" width="30" height="25" rx="4"/>
    <rect x="135" y="205" width="30" height="25" rx="4"/>
    <rect x="170" y="205" width="30" height="25" rx="4"/>
    <rect x="205" y="205" width="20" height="25" rx="4"/>
  </g>

  <!-- Speed lines -->
  <g stroke="url(#textGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="25" y1="45" x2="55" y2="45"/>
    <line x1="35" y1="60" x2="60" y2="60"/>
    <line x1="25" y1="75" x2="50" y2="75"/>
  </g>

  <!-- Timer arc -->
  <circle cx="128" cy="35" r="15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <path d="M 128 20 A 15 15 0 1 1 113 35" fill="none" stroke="#00ff88" stroke-width="4" stroke-linecap="round"/>
</svg>
