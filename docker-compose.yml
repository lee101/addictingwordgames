version: '3.8'

services:
  app:
    build: .
    container_name: wordgames_app
    env_file:
      - .env
    environment:
      - PORT=8891
      - LOCAL_DEBUG=false
      - WORDGAMES_DB=/data/wordgames.db
    volumes:
      - ./:/app
      - wordgames_data:/data
    expose:
      - "8891"
    restart: unless-stopped
    command: gunicorn -k gthread -b :8891 main:app --timeout 120 --workers 2 --threads 1

  nginx:
    image: nginx:alpine
    container_name: wordgames_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  wordgames_data:
